name: Build & Deploy to Elastic Beanstalk

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EB_APP_NAME: shinobij          # Change to your Elastic Beanstalk application name
  EB_ENV_NAME: shinobij-prod     # Change to your Elastic Beanstalk environment name
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node / Vite build ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: shinobij.client/package-lock.json

      - name: Install client dependencies
        working-directory: shinobij.client
        run: npm ci

      - name: Build Vite client
        working-directory: shinobij.client
        run: npm run build

      # Copy built frontend into the server's wwwroot so dotnet publish picks it up
      - name: Copy dist → wwwroot
        run: |
          mkdir -p ShinobiJ.Server/wwwroot
          cp -r shinobij.client/dist/. ShinobiJ.Server/wwwroot/

      # ── .NET publish ──────────────────────────────────────────────────────
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        working-directory: ShinobiJ.Server
        run: dotnet restore

      - name: Publish server
        working-directory: ShinobiJ.Server
        run: |
          dotnet publish -c Release -o ../publish \
            --no-restore \
            /p:EnvironmentName=Production

      # ── Package for Elastic Beanstalk ─────────────────────────────────────
      # EB expects a zip of the published output (not the source).
      - name: Zip publish output
        run: |
          cd publish
          zip -r ../deploy.zip .

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Upload to S3 deployment bucket
        run: |
          aws s3 cp deploy.zip \
            s3://${{ secrets.AWS_DEPLOY_BUCKET }}/shinobij-${{ github.sha }}.zip

      - name: Create new Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.EB_APP_NAME }}" \
            --version-label "${{ github.sha }}" \
            --source-bundle S3Bucket="${{ secrets.AWS_DEPLOY_BUCKET }}",S3Key="shinobij-${{ github.sha }}.zip" \
            --no-auto-create-application

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${{ env.EB_APP_NAME }}" \
            --environment-name "${{ env.EB_ENV_NAME }}" \
            --version-label "${{ github.sha }}"

      - name: Wait for environment to be ready
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ env.EB_APP_NAME }}" \
            --environment-names "${{ env.EB_ENV_NAME }}"
